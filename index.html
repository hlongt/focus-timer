<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HLT's Project 计时空间</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍅</text></svg>">
<style>
:root{
    --bg:#020617;
    --panel:#111827;
    --panel2:#1a2235;
    --text:#e5e7eb;
    --sub:#a5b4fc;
    --list:#0b1220;
    --total:#0b1220;
    --border:#1f2d45;
    --accent:#6366f1;
    --accent2:#818cf8;
    --pomo:#ef4444;
    --pomo-break:#22c55e;
    --chart-bar:#6366f1;
    --chart-bar2:#a5b4fc;
    --flip-bg:#0d1526;
    --flip-card:#1a2540;
    --flip-shadow:rgba(0,0,0,.6);
    --flip-text:#e2e8f0;
    --flip-sep:#6366f1;
}
.light{
    --bg:#f0f4ff;
    --panel:#ffffff;
    --panel2:#f8faff;
    --text:#111827;
    --sub:#4f46e5;
    --list:#eef2ff;
    --total:#eef2ff;
    --border:#dde3f0;
    --accent:#4f46e5;
    --accent2:#6366f1;
    --pomo:#dc2626;
    --pomo-break:#16a34a;
    --chart-bar:#4f46e5;
    --chart-bar2:#818cf8;
    --flip-bg:#e8eeff;
    --flip-card:#ffffff;
    --flip-shadow:rgba(0,0,0,.18);
    --flip-text:#1e2a4a;
    --flip-sep:#4f46e5;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
    font-family:"Microsoft YaHei", "PingFang SC", sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    padding:0;
    transition: background 0.4s ease;
    overflow-y:auto;
}

/* ── Global nav ── */
.global-nav{
    position:sticky;
    top:0;
    z-index:100;
    width:100%;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:10px 20px;
    background:transparent;
    transition:background 0.4s;
}
.nav-controls{ display:flex; gap:6px; align-items:center; }

/* ── Content wrapper ── */
.content-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    flex:1;
    padding:24px 0 60px;
    min-height:0;
}

/* ── Tabs ── */
.tab-bar{
    display:flex;
    gap:4px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:4px;
    margin-bottom:20px;
    width:600px;
    max-width:calc(100vw - 32px);
}
.tab-btn{
    flex:1;
    padding:8px 0;
    border:none;
    border-radius:10px;
    background:transparent;
    color:var(--text);
    font-size:13px;
    cursor:pointer;
    transition:all 0.25s;
    opacity:0.55;
    font-family:inherit;
}
.tab-btn.active{
    background:var(--accent);
    color:#fff;
    opacity:1;
    font-weight:600;
}

/* ── Main box ── */
.box{
    background:var(--panel);
    padding:28px 40px;
    border-radius:22px;
    border:1px solid var(--border);
    box-shadow:0 4px 40px rgba(0,0,0,.25);
    width:580px;
    max-width:calc(100vw - 32px);
    transition: background 0.4s ease;
    display:none;
}
.box.active{ display:block; }

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:12px;
    font-size:15px;
    cursor:pointer;
    transition:all 0.25s;
    outline:none;
    font-family:inherit;
}
button:hover{ filter:brightness(1.1); transform:translateY(-1px); }
button:active{ transform:translateY(1px); filter:brightness(0.9); }

.toggle-btn{
    padding:6px 14px;
    border-radius:10px;
    background:#374151;
    color:#fff;
    font-size:13px;
    margin:0;
}
.light .toggle-btn{ background:#dde3f0; color:#111827; }

.section-title{
    margin-top:14px;
    font-size:13px;
    color:var(--sub);
    display:flex;
    justify-content:space-between;
    align-items:center;
    letter-spacing:0.04em;
    text-transform:uppercase;
}

.clear-btn{
    padding:3px 10px;
    border-radius:8px;
    background:#ef4444;
    color:#fff;
    font-size:12px;
    margin:0;
    text-transform:none;
    letter-spacing:0;
}

/* ── Clock & counter ── */
.time{
    font-size:46px;
    text-align:center;
    font-variant-numeric:tabular-nums;
    letter-spacing:2px;
    margin:4px 0;
}
.counter-big{
    font-size:58px;
    text-align:center;
    margin:2px 0 14px;
    font-variant-numeric:tabular-nums;
    letter-spacing:3px;
    transition:color 0.3s;
}

.start{ background:#22c55e; color:#000; }
.pause{ background:#facc15; color:#000; }
.reset{ background:#f87171; color:#000; }

.total-box{
    margin-top:10px;
    background:var(--total);
    padding:10px 14px;
    border-radius:10px;
    font-size:14px;
    border:1px solid var(--border);
}
.list{
    text-align:left;
    max-height:160px;
    overflow-y:auto;
    margin-top:10px;
    background:var(--list);
    padding:10px 14px;
    border-radius:10px;
    font-size:13px;
    line-height:1.8;
    border:1px solid var(--border);
}

/* ── Pomodoro ── */
.pomo-mode-bar{
    display:flex;
    gap:6px;
    margin:10px 0;
    justify-content:center;
}
.pomo-mode-btn{
    padding:6px 18px;
    border-radius:20px;
    border:2px solid var(--border);
    background:transparent;
    color:var(--text);
    font-size:13px;
    margin:0;
    cursor:pointer;
    transition:all 0.2s;
}
.pomo-mode-btn.active-focus{ border-color:var(--pomo); color:var(--pomo); background:rgba(239,68,68,0.08); }
.pomo-mode-btn.active-break{ border-color:var(--pomo-break); color:var(--pomo-break); background:rgba(34,197,94,0.08); }

.pomo-ring-wrap{
    display:flex;
    justify-content:center;
    margin:12px 0 6px;
    position:relative;
}
.pomo-ring-wrap svg{ overflow:visible; }
.pomo-display{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    pointer-events:none;
}
.pomo-display .big{ font-size:42px; font-variant-numeric:tabular-nums; letter-spacing:2px; }
.pomo-display .label{ font-size:12px; color:var(--sub); margin-top:2px; }

.pomo-count-row{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:8px 0;
}
.pomo-dot{
    width:10px; height:10px;
    border-radius:50%;
    background:var(--border);
    transition:background 0.3s;
}
.pomo-dot.done{ background:var(--pomo); }

.pomo-settings{
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 16px;
    margin-top:14px;
    font-size:13px;
}
.pomo-settings summary{
    cursor:pointer;
    color:var(--sub);
    user-select:none;
    font-size:12px;
    letter-spacing:0.04em;
    text-transform:uppercase;
}
.pomo-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:10px;
    gap:8px;
}
.pomo-row label{ flex:1; color:var(--text); }
.pomo-row input[type=range]{ flex:1.5; accent-color:var(--accent); }
.pomo-row span{ min-width:38px; text-align:right; color:var(--sub); font-variant-numeric:tabular-nums; }

/* ── Stats ── */
.stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}
.stat-card{
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
}
.stat-card .val{ font-size:26px; font-weight:700; color:var(--accent2); margin-bottom:2px; font-variant-numeric:tabular-nums; }
.stat-card .lbl{ font-size:12px; color:var(--sub); }

.chart-wrap{
    margin-top:16px;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
}
.chart-title{
    font-size:12px;
    color:var(--sub);
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.chart-period-btn{
    padding:3px 10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
    font-size:11px;
    margin:0 2px;
    cursor:pointer;
    transition:all 0.2s;
}
.chart-period-btn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

.bar-chart{
    display:flex;
    align-items:flex-end;
    gap:4px;
    height:110px;
    position:relative;
}
.bar-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    height:100%;
    justify-content:flex-end;
}
.bar{
    width:100%;
    background:var(--chart-bar);
    border-radius:4px 4px 0 0;
    min-height:2px;
    transition:height 0.5s cubic-bezier(.22,1,.36,1), background 0.3s;
    position:relative;
    cursor:pointer;
}
.bar:hover{ background:var(--chart-bar2); }
.bar-tooltip{
    position:absolute;
    bottom:calc(100% + 4px);
    left:50%;
    transform:translateX(-50%);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:3px 7px;
    font-size:11px;
    white-space:nowrap;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.15s;
    color:var(--text);
    z-index:10;
}
.bar:hover .bar-tooltip{ opacity:1; }
.bar-lbl{
    font-size:10px;
    color:var(--sub);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
    text-align:center;
}

.heatmap-wrap{
    margin-top:16px;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
}
.heatmap-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:3px;
    margin-top:10px;
}
.hmap-cell{
    aspect-ratio:1;
    border-radius:3px;
    background:var(--border);
    transition:background 0.3s;
    cursor:pointer;
    position:relative;
}
.hmap-cell:hover .bar-tooltip{ opacity:1; }

/* ══════════════════════════════════
   FLIP CLOCK — split-flap (clip-path approach)

   4 panels per digit:
     .fc-bt  z=1  NEXT  top  — static behind ft
     .fc-bb  z=2  CURR  bot  — static, visible while ft folds
     .fc-ft  z=3  CURR  top  — folds: rotateX(0→-90), origin=bottom
     .fc-fb  z=4  NEXT  bot  — reveals: rotateX(90→0), origin=top

   KEY: clip-path instead of overflow:hidden.
        overflow:hidden flattens CSS 3D transforms.
        clip-path does not create a stacking context, so 3D is preserved.
══════════════════════════════════ */
#box-flip{
    background:var(--flip-bg);
    border-color:var(--border);
}
.flip-clock-wrap{
    display:flex; flex-direction:column; align-items:center;
    padding:20px 0 14px; gap:18px;
}
.flip-date-row{
    font-size:13px; color:var(--sub);
    letter-spacing:0.08em; opacity:0.75;
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
}
.flip-group-row{
    display:flex; align-items:center; gap:6px;
}
.flip-sep{
    font-size:50px; font-weight:900; color:var(--flip-sep);
    line-height:1; padding-bottom:6px; opacity:0.55;
    user-select:none; font-family:"Courier New",monospace;
    width:18px; text-align:center;
}

/* card */
.fc-digit{
    position:relative; width:72px; height:90px;
    flex-shrink:0;
    perspective:250px;   /* perspective on parent of rotating elements */
}

/* all 4 panels */
.fc-bt,.fc-bb,.fc-ft,.fc-fb{
    position:absolute; left:0; right:0; height:45px;
    background:var(--flip-card);
}

/* number span: full-height, centred, overflows — panels clip via clip-path */
.fc-bt span,.fc-bb span,.fc-ft span,.fc-fb span{
    display:block; width:100%; height:90px;
    font-size:72px; font-weight:900;
    font-family:"Courier New","Consolas",monospace;
    font-variant-numeric:tabular-nums;
    color:var(--flip-text); letter-spacing:-2px;
    line-height:90px; text-align:center; user-select:none;
}

/* TOP panels — clip-path shows top half only */
.fc-bt,.fc-ft{
    top:0;
    border-bottom:2px solid var(--flip-bg);
    clip-path:inset(0 0 0 0 round 8px 8px 0 0);
}
.fc-bt span,.fc-ft span{ margin-top:0; }

/* BOTTOM panels — span shifted up, clip-path shows bottom half only */
.fc-bb,.fc-fb{
    top:47px;
    clip-path:inset(0 0 0 0 round 0 0 8px 8px);
}
.fc-bb span,.fc-fb span{ margin-top:-45px; }

/* z-order and 3D setup */
.fc-bt{ z-index:1; }
.fc-bb{ z-index:2; }
.fc-ft{ z-index:3; transform-origin:center bottom; }
.fc-fb{ z-index:4; transform-origin:center top; transform:rotateX(90deg); }

/* shadow overlays */
.fc-bt::after,.fc-ft::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom,rgba(255,255,255,.03),rgba(0,0,0,.22));
    pointer-events:none;
}
.fc-bb::after,.fc-fb::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.30),rgba(0,0,0,.03));
    pointer-events:none;
}
/* centre seam */
.fc-digit::before{
    content:''; position:absolute;
    left:0; right:0; top:44px; height:3px;
    background:var(--flip-bg); z-index:10;
}

/* flip animations */
@keyframes fc-fold  { from{transform:rotateX(0deg)}   to{transform:rotateX(-90deg)} }
@keyframes fc-unfold{ from{transform:rotateX(90deg)}  to{transform:rotateX(0deg)}   }
.fc-digit.flipping .fc-ft{ animation:fc-fold   0.3s ease-in  0s    forwards; }
.fc-digit.flipping .fc-fb{ animation:fc-unfold 0.3s ease-out 0.3s  forwards; }

/* format controls */
.flip-controls{
    display:flex; gap:8px; margin-top:2px; justify-content:center;
}
.flip-ctrl-btn{
    padding:5px 16px; border-radius:20px;
    border:1.5px solid var(--border); background:transparent;
    color:var(--sub); font-size:12px; margin:0; cursor:pointer;
    transition:all 0.2s; font-family:inherit;
}
.flip-ctrl-btn.active{
    border-color:var(--accent); color:var(--accent);
    background:rgba(99,102,241,0.1);
}


/* ── author ── */
.author-info{
    position:fixed;
    bottom:0;
    width:100%;
    font-size:13px;
    color:var(--sub);
    text-align:center;
    padding:5px 0;
    background:transparent;
}
.author-info a{ text-decoration:none; color:inherit; }

/* Notification toast */
.toast{
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%) translateY(-80px);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 24px;
    font-size:14px;
    box-shadow:0 8px 32px rgba(0,0,0,.3);
    transition:transform 0.4s cubic-bezier(.22,1,.36,1);
    z-index:999;
    white-space:nowrap;
}
.toast.show{ transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Global nav -->
<nav class="global-nav">
    <div class="nav-controls">
        <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">🌓 自动</button>
        <button class="toggle-btn" onclick="toggleLang()" id="langBtn">🌐 中文</button>
    </div>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="content-wrap">

<!-- Tabs -->
<div class="tab-bar" id="tabBar">
    <button class="tab-btn active" onclick="switchTab('flip')" id="tab-flip">🕐 翻页时钟</button>
    <button class="tab-btn" onclick="switchTab('free')" id="tab-free">⏱ 自由计时</button>
    <button class="tab-btn" onclick="switchTab('pomo')" id="tab-pomo">🍅 番茄钟</button>
    <button class="tab-btn" onclick="switchTab('stats')" id="tab-stats">📊 统计</button>
</div>

<!-- ══════════════ 翻页时钟 ══════════════ -->
<div class="box active" id="box-flip">
    <div class="flip-clock-wrap">

        <!-- Date row -->
        <div class="flip-date-row" id="flipDateRow">—</div>

        <!-- H : M : S — each digit is a .fc-digit -->
        <div class="flip-group-row" id="flipRow">
            <!-- Hours tens -->
            <div class="fc-digit" id="fc-h0">
                <div class="fc-bt"><span>0</span></div>
                <div class="fc-bb"><span>0</span></div>
                <div class="fc-ft"><span>0</span></div>
                <div class="fc-fb"><span>0</span></div>
            </div>
            <!-- Hours units -->
            <div class="fc-digit" id="fc-h1">
                <div class="fc-bt"><span>0</span></div>
                <div class="fc-bb"><span>0</span></div>
                <div class="fc-ft"><span>0</span></div>
                <div class="fc-fb"><span>0</span></div>
            </div>

            <div class="flip-sep">:</div>

            <!-- Minutes tens -->
            <div class="fc-digit" id="fc-m0">
                <div class="fc-bt"><span>0</span></div>
                <div class="fc-bb"><span>0</span></div>
                <div class="fc-ft"><span>0</span></div>
                <div class="fc-fb"><span>0</span></div>
            </div>
            <!-- Minutes units -->
            <div class="fc-digit" id="fc-m1">
                <div class="fc-bt"><span>0</span></div>
                <div class="fc-bb"><span>0</span></div>
                <div class="fc-ft"><span>0</span></div>
                <div class="fc-fb"><span>0</span></div>
            </div>

            <div class="flip-sep">:</div>

            <!-- Seconds tens -->
            <div class="fc-digit" id="fc-s0">
                <div class="fc-bt"><span>0</span></div>
                <div class="fc-bb"><span>0</span></div>
                <div class="fc-ft"><span>0</span></div>
                <div class="fc-fb"><span>0</span></div>
            </div>
            <!-- Seconds units -->
            <div class="fc-digit" id="fc-s1">
                <div class="fc-bt"><span>0</span></div>
                <div class="fc-bb"><span>0</span></div>
                <div class="fc-ft"><span>0</span></div>
                <div class="fc-fb"><span>0</span></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flip-controls">
            <button class="flip-ctrl-btn active" id="fmt-24" onclick="setHourFmt(24)">24h</button>
            <button class="flip-ctrl-btn" id="fmt-12" onclick="setHourFmt(12)">12h</button>
        </div>
    </div>
</div>

<!-- ══════════════ 自由计时 ══════════════ -->
<div class="box" id="box-free">

    <div class="section-title" id="t-focus">专注计时</div>
    <div id="focus" class="counter-big">00:00:00</div>

    <div style="text-align:center;margin-bottom:4px;">
        <button class="start" onclick="freeStart()" id="b-start">开始</button>
        <button class="pause" onclick="freePause()" id="b-pause">暂停</button>
        <button class="reset" onclick="freeFinish()" id="b-finish">结束并保存</button>
    </div>

    <div class="section-title">
        <span id="t-history">历史记录</span>
        <button class="clear-btn" onclick="clearHistory()" id="clearBtn">清空</button>
    </div>
    <div class="total-box">
        <span id="t-total">累计时长：</span><span id="total">00:00:00</span>
    </div>
    <div class="list" id="history">暂无记录</div>
</div>

<!-- ══════════════ 番茄钟 ══════════════ -->
<div class="box" id="box-pomo">

    <div class="pomo-mode-bar">
        <button class="pomo-mode-btn active-focus" id="pm-focus" onclick="setPomoMode('focus')">🍅 专注</button>
        <button class="pomo-mode-btn" id="pm-short" onclick="setPomoMode('short')">☕ 短休息</button>
        <button class="pomo-mode-btn" id="pm-long" onclick="setPomoMode('long')">🛋 长休息</button>
    </div>

    <div class="pomo-ring-wrap">
        <svg id="pomoSvg" width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="86" fill="none" stroke="var(--border)" stroke-width="10"/>
            <circle id="pomoArc" cx="100" cy="100" r="86" fill="none"
                stroke="var(--pomo)" stroke-width="10"
                stroke-linecap="round"
                stroke-dasharray="540.35"
                stroke-dashoffset="0"
                transform="rotate(-90 100 100)"
                style="transition:stroke-dashoffset 1s linear, stroke 0.4s;"/>
        </svg>
        <div class="pomo-display">
            <div class="big" id="pomoTime">25:00</div>
            <div class="label" id="pomoLabel">专注中</div>
        </div>
    </div>

    <div class="pomo-count-row" id="pomoDots"></div>

    <div style="text-align:center;margin:6px 0 10px;">

function format(s){

        .map(n=>String(n).padStart(2,"0")).join(":");
}
function formatMM(s){

}

/* ═══════════════════════════════════════
   FLIP CLOCK
═══════════════════════════════════════ */
let hourFmt = Number(localStorage.getItem("hourFmt")) || 24;

// Track displayed value per digit slot
const fcSlots = ["h0","h1","m0","m1","s0","s1"];
const fcCurrent = { h0:-1, h1:-1, m0:-1, m1:-1, s0:-1, s1:-1 };
const fcBusy    = { h0:false, h1:false, m0:false, m1:false, s0:false, s1:false };

function setHourFmt(fmt){
    hourFmt = fmt;
    localStorage.setItem("hourFmt", fmt);
    document.getElementById("fmt-24").classList.toggle("active", fmt===24);
    document.getElementById("fmt-12").classList.toggle("active", fmt===12);
    // force full redraw
    fcSlots.forEach(k=>{ fcCurrent[k]=-1; });
    tickFlip();
}

// Get panels for a slot by class selector (safe, order-independent)
function fcPanels(slot){
    const el = document.getElementById("fc-"+slot);
    return {
        el,
        bt: el.querySelector(".fc-bt span"),
        bb: el.querySelector(".fc-bb span"),
        ft: el.querySelector(".fc-ft span"),
        fb: el.querySelector(".fc-fb span"),
        ftEl: el.querySelector(".fc-ft"),
        fbEl: el.querySelector(".fc-fb"),
    };
}

function fcSet(slot, digit){
    const d = String(digit);
    const p = fcPanels(slot);
    p.bt.textContent = d;
    p.bb.textContent = d;
    p.ft.textContent = d;
    p.fb.textContent = d;
    p.ftEl.style.animation = "none";
    p.fbEl.style.animation = "none";
    p.ftEl.style.transform = "rotateX(0deg)";
    p.fbEl.style.transform = "rotateX(90deg)";
    fcCurrent[slot] = digit;
}

function fcFlip(slot, next){
    if(fcBusy[slot]) return;
    const prev = fcCurrent[slot];
    if(prev === next) return;
    fcBusy[slot] = true;

    const prevD = String(prev);
    const nextD = String(next);
    const p     = fcPanels(slot);

    // bt = NEXT top (revealed when ft folds away)
    // bb = CURR bot (visible while ft folds)
    // ft = CURR top (folds toward viewer: 0→-90°)
    // fb = NEXT bot (reveals downward: 90→0°)
    p.bt.textContent = nextD;
    p.bb.textContent = prevD;
    p.ft.textContent = prevD;
    p.fb.textContent = nextD;

    p.ftEl.style.animation = "none";
    p.fbEl.style.animation = "none";
    p.ftEl.style.transform = "rotateX(0deg)";
    p.fbEl.style.transform = "rotateX(90deg)";
    void p.el.offsetWidth;

    p.el.classList.remove("flipping");
    void p.el.offsetWidth;
    p.el.classList.add("flipping");

    setTimeout(()=>{
        p.el.classList.remove("flipping");
        p.bt.textContent = nextD;
        p.bb.textContent = nextD;
        p.ft.textContent = nextD;
        p.fb.textContent = nextD;
        p.ftEl.style.animation = "none";
        p.fbEl.style.animation = "none";
        p.ftEl.style.transform = "rotateX(0deg)";
        p.fbEl.style.transform = "rotateX(90deg)";
        fcCurrent[slot] = next;
        fcBusy[slot]    = false;
    }, 660);
}

function updateFlipDate(now){
    const days = T[lang].weekdays;
    const wd   = days[now.getDay()];
    const mo   = now.getMonth()+1;
    const d    = now.getDate();
    const y    = now.getFullYear();
    if(lang==="cn"){
        document.getElementById("flipDateRow").innerText = `${y}年${mo}月${d}日  ${wd}`;
    } else {
        const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        document.getElementById("flipDateRow").innerText = `${wd}, ${months[now.getMonth()]} ${d}, ${y}`;
    }
}

function tickFlip(){
    const now = new Date();
    let rawH  = now.getHours();
    if(hourFmt===12) rawH = rawH%12 || 12;
    const h = rawH;
    const m = now.getMinutes();
    const s = now.getSeconds();

    updateFlipDate(now);

    // Break each value into tens/units digit
    const vals = {
        h0: Math.floor(h/10), h1: h%10,
        m0: Math.floor(m/10), m1: m%10,
        s0: Math.floor(s/10), s1: s%10,
    };

    fcSlots.forEach(slot=>{
        const next = vals[slot];
        if(fcCurrent[slot] === -1){
            fcSet(slot, next);
        } else if(fcCurrent[slot] !== next){
            fcFlip(slot, next);
        }
    });
}

let freeTimer = null;
let totalSec   = Number(localStorage.getItem("totalAll")) || 0;
let sessions   = JSON.parse(localStorage.getItem("sessions") || "[]");
let baseSec    = Number(localStorage.getItem("baseSec")) || 0;
let startTime  = Number(localStorage.getItem("startTime")) || 0;

function getDisplaySec(){
    if(!startTime) return baseSec;
    return baseSec + Math.floor((Date.now()-startTime)/1000);
}
function updateFreeDisplay(){ document.getElementById("focus").innerText = format(getDisplaySec()); }

function freeStart(){
    if(freeTimer) return;
    if(!startTime){ startTime=Date.now(); localStorage.setItem("startTime",startTime); }
    freeTimer = setInterval(updateFreeDisplay, 1000);
}
function freePause(){
    if(!freeTimer) return;
    clearInterval(freeTimer); freeTimer=null;
    baseSec=getDisplaySec(); startTime=0;
    localStorage.setItem("baseSec",baseSec);
    localStorage.removeItem("startTime");
    updateFreeDisplay();
}
function freeFinish(){
    const final=getDisplaySec();
    freePause();
    if(!final) return;
    totalSec+=final;
    localStorage.setItem("totalAll",totalSec);
    document.getElementById("total").innerText = format(totalSec);
    sessions.push({ duration:final, time:new Date().toLocaleString(), date:todayStr() });
    localStorage.setItem("sessions",JSON.stringify(sessions));
    baseSec=0; startTime=0;
    localStorage.removeItem("baseSec"); localStorage.removeItem("startTime");
    document.getElementById("focus").innerText="00:00:00";
    renderFreeHistory();
}

function renderFreeHistory(){
    const box=document.getElementById("history");
    box.innerHTML = sessions.length ? sessions.map(s=>`📌 ${s.time} —— ${format(s.duration)}`).join("<br>") : t("none");
}

function clearHistory(){
    const msg = lang==="cn"?"确定清空所有记录吗？":"Clear all records?";
    if(!confirm(msg)) return;
    if(freeTimer){clearInterval(freeTimer);freeTimer=null;}
    ["totalAll","sessions","baseSec","startTime","pomoSessions"].forEach(k=>localStorage.removeItem(k));
    totalSec=0; sessions=[]; baseSec=0; startTime=0; pomoSessions=[];
    document.getElementById("total").innerText="00:00:00";
    document.getElementById("focus").innerText="00:00:00";
    renderFreeHistory(); updatePomoToday(); updateStats();
}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
let pomoSettings = JSON.parse(localStorage.getItem("pomoSettings") || "null") || {
    focus:25, short:5, long:15, rounds:4
};
let pomoMode     = "focus";
let pomoRunning  = false;
let pomoTimer    = null;
let pomoRemain   = pomoSettings.focus * 60;
let pomoCycle    = 0;
let pomoSessions = JSON.parse(localStorage.getItem("pomoSessions") || "[]");
const CIRCUM     = 2 * Math.PI * 86;

function pomoTotalSec(){
    return (pomoMode==="focus"?pomoSettings.focus:pomoMode==="short"?pomoSettings.short:pomoSettings.long)*60;
}

function setPomoMode(mode, reset=true){
    pomoMode=mode;
    ["focus","short","long"].forEach(m=>{
        const btn=document.getElementById("pm-"+m);
        btn.className="pomo-mode-btn"+(m===mode?" "+(m==="focus"?"active-focus":"active-break"):"");
    });
    if(reset){ if(pomoTimer){clearInterval(pomoTimer);pomoTimer=null;} pomoRunning=false; pomoRemain=pomoTotalSec(); }
    renderPomoRing(); updatePomoLabel();
}

function updatePomoLabel(){
    const lbl = pomoMode==="focus"?t("pomoDoing"):pomoMode==="short"?t("pomoShortDoing"):t("pomoLongDoing");
    document.getElementById("pomoLabel").innerText = lbl;
}

function renderPomoRing(){
    document.getElementById("pomoTime").innerText = formatMM(pomoRemain);
    const total = pomoTotalSec();
    const pct   = pomoRemain / total;
    const arc   = document.getElementById("pomoArc");
    arc.style.strokeDashoffset = CIRCUM * (1 - pct);
    arc.style.stroke = pomoMode==="focus"?"var(--pomo)":"var(--pomo-break)";
    renderPomoDots();
}

function renderPomoDots(){
    const n = pomoSettings.rounds;
    let html="";
    for(let i=0;i<n;i++) html+=`<div class="pomo-dot${i<pomoCycle?" done":""}"></div>`;
    document.getElementById("pomoDots").innerHTML=html;
}

function pomoStart(){
    if(pomoRunning) return;
    pomoRunning=true;
    pomoTimer=setInterval(()=>{
        pomoRemain--;
        renderPomoRing();
        if(pomoRemain<=0){ clearInterval(pomoTimer); pomoTimer=null; pomoRunning=false; pomoDone(); }
    },1000);
}

function pomoPause(){
    if(!pomoRunning) return;
    pomoRunning=false;
    clearInterval(pomoTimer); pomoTimer=null;
}

function pomoReset(){
    if(pomoTimer){clearInterval(pomoTimer);pomoTimer=null;}
    pomoRunning=false;
    pomoRemain=pomoTotalSec();
    renderPomoRing();
}

function pomoDone(){
    if(pomoMode==="focus"){
        pomoCycle++;
        pomoSessions.push({ date:todayStr(), ts:Date.now(), duration:pomoSettings.focus*60 });
        localStorage.setItem("pomoSessions",JSON.stringify(pomoSessions));
        totalSec+=pomoSettings.focus*60;
        localStorage.setItem("totalAll",totalSec);
        sessions.push({ duration:pomoSettings.focus*60, time:new Date().toLocaleString(), date:todayStr(), fromPomo:true });
        localStorage.setItem("sessions",JSON.stringify(sessions));
        updatePomoToday();
        showToast(t("toastPomoFocus"));
        if(pomoCycle>=pomoSettings.rounds){
            pomoCycle=0; setPomoMode("long");
        } else {
            setPomoMode("short");
        }
    } else {
        showToast(pomoMode==="short"?t("toastPomoShort"):t("toastPomoLong"));
        setPomoMode("focus");
    }
    renderPomoDots();
    tryNotify(document.getElementById("pomoLabel").innerText);
}

function updatePomoToday(){
    const today=todayStr();
    const todaySessions = pomoSessions.filter(s=>s.date===today);
    document.getElementById("pomo-today-val").innerText = todaySessions.length+" "+t("pomoUnit");
    document.getElementById("pomo-today-time").innerText = todaySessions.reduce((a,s)=>a+s.duration,0)/60+" "+t("pomoMin");
}

function updatePomoSettings(){
    const get=id=>Number(document.getElementById(id).value);
    pomoSettings={focus:get("ps-focus"),short:get("ps-short"),long:get("ps-long"),rounds:get("ps-rounds")};
    localStorage.setItem("pomoSettings",JSON.stringify(pomoSettings));
    document.getElementById("ps-focus-val").innerText=pomoSettings.focus+" "+t("psMin");
    document.getElementById("ps-short-val").innerText=pomoSettings.short+" "+t("psMin");
    document.getElementById("ps-long-val").innerText=pomoSettings.long+" "+t("psMin");
    document.getElementById("ps-rounds-val").innerText=pomoSettings.rounds+" "+t("psRound");
    if(!pomoRunning){ pomoRemain=pomoTotalSec(); renderPomoRing(); }
}

["focus","short","long","rounds"].forEach(k=>{
    const el=document.getElementById("ps-"+k);
    if(el){
        el.value=pomoSettings[k];
        const unit=k==="rounds"?t("psRound"):t("psMin");
        document.getElementById("ps-"+k+"-val").innerText=pomoSettings[k]+" "+unit;
    }
});

setPomoMode("focus",true);
updatePomoToday();

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
let currentChartDays = 7;

function updateStats(){
    const today = todayStr();
    const allSec = totalSec;
    const totalH = Math.floor(allSec/3600);
    const totalM = Math.floor((allSec%3600)/60);
    document.getElementById("st-total-time").innerText = totalH+"h "+totalM+"m";
    document.getElementById("st-sessions").innerText = sessions.length;
    const todaySecs = sessions.filter(s=>s.date===today).reduce((a,s)=>a+s.duration,0);
    document.getElementById("st-today").innerText = Math.floor(todaySecs/60)+"m";
    document.getElementById("st-pomos").innerText = pomoSessions.filter(s=>s.date===today).length;
    renderBarChart(currentChartDays);
    renderHeatmap();
}

function setChartPeriod(days, btn){
    currentChartDays=days;
    document.querySelectorAll(".chart-period-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderBarChart(days);
}

function getDailyMinutes(days){
    const map={};
    const now=new Date();
    for(let i=days-1;i>=0;i--){
        const d=new Date(now); d.setDate(now.getDate()-i);
        map[dateStr(d)]=0;
    }
    sessions.forEach(s=>{ if(map[s.date]!==undefined) map[s.date]+=Math.round(s.duration/60); });
    return map;
}

function renderBarChart(days){
    const map = getDailyMinutes(days);
    const entries = Object.entries(map);
    const maxVal  = Math.max(...entries.map(([,v])=>v), 1);
    const today   = todayStr();
    const wrap    = document.getElementById("barChart");
    wrap.innerHTML = entries.map(([date,val])=>{
        const pct = val/maxVal;
        const h   = Math.max(pct*100, val>0?3:0);
        const isToday = date===today;
        const lbl = isToday ? t("todayLabel") : formatDayLabel(date, days);
        const tip = `${date}: ${val} ${t("minUnit")}`;
        return `<div class="bar-col">
            <div class="bar" style="height:${h}px;${isToday?'background:var(--pomo);':''}">
                <div class="bar-tooltip">${tip}</div>
            </div>
            <div class="bar-lbl">${lbl}</div>
        </div>`;
    }).join("");
}

function formatDayLabel(ds, totalDays){
    const parts = ds.split("-");
    const d = new Date(parts[0], parts[1]-1, parts[2]);
    if(totalDays<=7) return T[lang].weekdays[d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderHeatmap(){
    const days=28;
    const map=getDailyMinutes(days);
    const entries=Object.entries(map);
    const maxVal=Math.max(...entries.map(([,v])=>v),1);
    const wrap=document.getElementById("heatmapGrid");
    wrap.innerHTML=entries.map(([date,val])=>{
        const pct=val/maxVal;
        let bg="var(--border)";
        if(pct>0.75) bg="#6366f1";
        else if(pct>0.5) bg="#6366f1cc";
        else if(pct>0.25) bg="#6366f199";
        else if(pct>0) bg="#6366f155";
        return `<div class="hmap-cell" style="background:${bg}">
            <div class="bar-tooltip">${date}: ${val} ${t("minUnit")}</div>
        </div>`;
    }).join("");
}

/* ═══════════════════════════════════════
   NOTIFICATION & TOAST
═══════════════════════════════════════ */
function tryNotify(msg){
    if(!("Notification" in window)) return;
    if(Notification.permission==="granted") new Notification("🍅 计时空间", {body:msg});
    else if(Notification.permission!=="denied") Notification.requestPermission();
}

let toastTimer=null;
function showToast(msg){
    const el=document.getElementById("toast");
    el.innerText=msg; el.classList.add("show");
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove("show"),3200);
}

/* ═══════════════════════════════════════
   VISIBILITY & UNLOAD
═══════════════════════════════════════ */
document.addEventListener("visibilitychange",()=>{
    if(!document.hidden){ updateFreeDisplay(); renderPomoRing(); tickFlip(); }
});
window.addEventListener("beforeunload",e=>{
    if(freeTimer||pomoRunning){ e.preventDefault(); e.returnValue=""; }
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
applyLang();
</script>
